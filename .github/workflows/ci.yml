name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CombatGame.sln

      - name: Build
        run: dotnet build CombatGame.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test CombatGame.sln --no-build --configuration Release --verbosity normal

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/CombatGame.Client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/CombatGame.Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /hex-brigade-combat/
